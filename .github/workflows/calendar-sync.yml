name: Calendar Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r calendarsync/requirements.txt

      - name: Restore syncToken cache
        uses: actions/cache/restore@v4
        with:
          path: .sync-cache
          key: calendarsync-tokens-${{ github.run_id }}
          restore-keys: |
            calendarsync-tokens-

      - name: Run calendar sync
        env:
          GOOGLE_OAUTH_AHAL: ${{ secrets.GOOGLE_OAUTH_AHAL }}
          GOOGLE_OAUTH_RUTOPIA: ${{ secrets.GOOGLE_OAUTH_RUTOPIA }}
          GOOGLE_OAUTH_REURBANO: ${{ secrets.GOOGLE_OAUTH_REURBANO }}
          GOOGLE_SA_PERSONAL: ${{ secrets.GOOGLE_SA_PERSONAL }}
        run: python calendarsync/sync.py

      - name: Save syncToken cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .sync-cache
          key: calendarsync-tokens-${{ github.run_id }}
