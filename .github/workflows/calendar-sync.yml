name: Calendar Sync

on:
  push:
    paths:
      - ".github/workflows/calendar-sync.yml"
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r calendarsync/requirements.txt

      - name: Run calendar sync
        env:
          GOOGLE_SA_AHAL: ${{ secrets.GOOGLE_SA_AHAL }}
          GOOGLE_OAUTH_RUTOPIA: ${{ secrets.GOOGLE_OAUTH_RUTOPIA }}
          GOOGLE_OAUTH_REURBANO: ${{ secrets.GOOGLE_OAUTH_REURBANO }}
          GOOGLE_SA_PERSONAL: ${{ secrets.GOOGLE_SA_PERSONAL }}
        run: python calendarsync/sync.py
